<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAID MAHBOUB SMART DASHBOARD</title>
    <style>
        /* Force l'application à prendre tout l'écran proprement et élimine l'espace blanc du bas */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #F8FAFC; 
        }
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            display: block;
        }
    </style>
</head>
<body>
    <!-- L'iframe configurée pour occuper 100% de la page sans la bannière Google -->
    <iframe src="https://script.google.com/macros/s/AKfycbxQOj8QirfqJyboa9ouquMq70Hzl57ZErs2gHuZi0SSzXfC5ukeZFBVM4GiT224kfWR/exec" allow="geolocation; microphone; camera"></iframe>
</body>
</html>
