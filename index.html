<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAID MAHBOUB SMART DASHBOARD</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #F8FAFC; 
        }
        
        /* Conteneur principal qui bloque les débordements */
        .iframe-container {
            position: absolute;
            left: 0;
            width: 100%;
            overflow: hidden;
        }

        /* 💻 MASQUAGE ORDINATEUR (Bannière de 46px) */
        @media (min-width: 768px) {
            .iframe-container { top: -46px; height: calc(100% + 46px); }
        }

        /* 📱 MASQUAGE SMARTPHONE (Bannière plus large, 65px) */
        @media (max-width: 767px) {
            .iframe-container { top: -65px; height: calc(100% + 65px); }
        }

        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            display: block; 
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbxQOj8QirfqJyboa9ouquMq70Hzl57ZErs2gHuZi0SSzXfC5ukeZFBVM4GiT224kfWR/exec" allow="geolocation; microphone; camera"></iframe>
    </div>
</body>
</html>
