<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAID MAHBOUB SMART DASHBOARD</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F8FAFC;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* 💡 L'ASTUCE DU CACHE SUPERPOSÉ */
        .google-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #0F172A; /* Le même bleu nuit que ton menu */
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            z-index: 9999; /* Bloqué tout en haut, par-dessus l'iframe */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* Ajustement de la taille du cache et du texte selon l'écran */
        @media (min-width: 768px) {
            .google-mask { height: 48px; font-size: 13px; }
        }
        @media (max-width: 767px) {
            .google-mask { height: 60px; font-size: 10px; } /* Texte optimisé pour rentrer sur smartphone */
        }

        /* 📱 L'IFRAME RESTE NORMALE : ZÉRO DÉCALAGE = ZÉRO CRASH MOBILE */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1; /* Reste sagement sous le cache */
        }
    </style>
</head>
<body>

    <div class="google-mask">
        ⚓ Poste 6 — Port de Safi — said mahboub — application
    </div>

    <iframe src="https://script.google.com/macros/s/AKfycbxQOj8QirfqJyboa9ouquMq70Hzl57ZErs2gHuZi0SSzXfC5ukeZFBVM4GiT224kfWR/exec" allow="geolocation; microphone; camera"></iframe>

</body>
</html>
