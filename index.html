<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAID MAHBOUB SMART DASHBOARD</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: rgba(37, 99, 235, 0.1);
            border: 2px solid var(--primary);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
        }

        .logo-icon {
            font-size: 2rem;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin: 0 0 2rem 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            padding: 0.85rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: rgba(148, 163, 184, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20deg); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <span class="logo-icon">📊</span>
        </div>
        <h1>SAID MAHBOUB</h1>
        <p>SMART DASHBOARD<br><span style="font-size: 0.85rem; color: #64748b;">Suivi de Projet & Indicateurs</span></p>
        
        <!-- Le bouton magique qui ouvre ton application parfaitement en plein écran -->
        <a href="https://script.google.com/macros/s/AKfycbxQOj8QirfqJyboa9ouquMq70Hzl57ZErs2gHuZi0SSzXfC5ukeZFBVM4GiT224kfWR/exec" class="btn" target="_blank">
            Ouvrir le Tableau de Bord 🚀
        </a>

        <div class="footer">
            Connexion sécurisée via Google Web Apps
        </div>
    </div>

</body>
</html>
