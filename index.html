<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAID MAHBOUB SMART DASHBOARD</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F8FAFC;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #0F172A;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #E2E8F0;
            border-top: 5px solid #2563EB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 600;
        }
        p {
            color: #64748B;
            font-size: 1rem;
        }
    </style>
    <script>
        // Redirection automatique, immédiate et sécurisée vers ton application Google
        window.location.replace("https://script.google.com/macros/s/AKfycbxQOj8QirfqJyboa9ouquMq70Hzl57ZErs2gHuZi0SSzXfC5ukeZFBVM4GiT224kfWR/exec");
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <h2>SAID MAHBOUB SMART DASHBOARD</h2>
        <p>Connexion sécurisée en cours...</p>
    </div>
</body>
</html>
