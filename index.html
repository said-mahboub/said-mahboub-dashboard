<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAID MAHBOUB SMART DASHBOARD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F8FAFC;
            font-family: sans-serif;
        }
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #F8FAFC;
            z-index: 1;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="loading">
        <p>Chargement du Dashboard Poste 6...</p>
    </div>
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxQOj8QirfqJyboa9ouquMq70Hzl57ZErs2gHuZi0SSzXfC5ukeZFBVM4GiT224kfWR/exec"
        title="SAID MAHBOUB SMART DASHBOARD"
        allow="clipboard-write"
        onload="document.getElementById('loading').style.display='none';">
    </iframe>
</body>
</html>
