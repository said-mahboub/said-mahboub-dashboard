<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAID MAHBOUB SMART DASHBOARD</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #F8FAFC; 
        }
        /* Masque les débordements et force l'affichage propre */
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbyh_G-_nn7vyNj-ZB2Ad1JcwtiGlkQ5cufz57bPL37iwEmbkdawVuHRFZlatJm216-x/exec" allow="geolocation; microphone; camera"></iframe>
    </div>
</body>
</html>
