<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAID MAHBOUB | SMART DASHBOARD</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #F8FAFC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #1e293b; font-size: 24px; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #0f172a;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .btn:hover { background-color: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard Poste 6</h1>
        <p>Cliquez ci-dessous pour accéder au suivi sécurisé des travaux du Port de Safi.</p>

           target="_blank" 
           class="btn">Accéder au Dashboard</a>
    </div>

</html>
