<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAID MAHBOUB SMART DASHBOARD</title>
    
    <script>
        // 🟢 DETECTION ET REDIRECTION AUTOMATIQUE POUR SMARTPHONES & TABLETTES
        if (/Mobi|Android|iPhone|iPad|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            window.location.href = "https://script.google.com/macros/s/AKfycbxQOj8QirfqJyboa9ouquMq70Hzl57ZErs2gHuZi0SSzXfC5ukeZFBVM4GiT224kfWR/exec";
        }
    </script>
    
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #F8FAFC; 
        }
        
        .iframe-container {
            position: absolute;
            left: 0;
            width: 100%;
            overflow: hidden;
        }

        /* Configuration Ordinateur (PC) */
        @media (min-width: 768px) {
            .iframe-container {
                top: -46px; 
                height: calc(100% + 46px);
            }
        }

        /* Configuration de secours Mobile */
        @media (max-width: 767px) {
            .iframe-container {
                top: -65px; 
                height: calc(100% + 65px);
            }
        }

        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            display: block; 
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbxQOj8QirfqJyboa9ouquMq70Hzl57ZErs2gHuZi0SSzXfC5ukeZFBVM4GiT224kfWR/exec" allow="geolocation; microphone; camera"></iframe>
    </div>

</body>
</html>
